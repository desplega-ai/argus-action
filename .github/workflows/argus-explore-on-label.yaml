name: Argus Explore (label-gated example)

on:
  pull_request:
    types: [labeled]

jobs:
  explore:
    if: github.event.label.name == 'run-argus'
    uses: ./.github/workflows/argus-pr.yaml
    with:
      scenario: pr-explore
      base_url: 'https://desplega.ai'
      wait_mode: poll
      fail_on: never
      extra_vars: '{"PR_BODY": ${{ toJSON(github.event.pull_request.body) }}}'
    secrets:
      ARGUS_API_KEY: ${{ secrets.ARGUS_API_KEY }}
