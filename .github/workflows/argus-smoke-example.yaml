name: Argus Smoke (example)

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario identifier (used for comment marker + scenario file lookup).'
        required: false
        type: string
        default: 'argus'
      base_url:
        description: 'Target URL to smoke.'
        required: true
        type: string
        default: 'https://desplega.ai'
      prompt_template:
        description: 'Inline prompt body (overrides file + scenario lookup).'
        required: false
        type: string
        default: ''
      prompt_template_file:
        description: 'Path to a prompt file, relative to workspace.'
        required: false
        type: string
        default: ''
      argus_base_url:
        description: 'Argus backend base URL.'
        required: false
        type: string
        default: 'https://api.desplega.ai'
      ui_base_url:
        description: 'UI base URL used for session links in the PR comment.'
        required: false
        type: string
        default: 'https://app.desplega.ai'
      extra_vars:
        description: 'JSON object of extra ${VAR} values.'
        required: false
        type: string
        default: '{}'
      wait_mode:
        description: 'poll (stream + poll) or no (fire-and-forget).'
        required: false
        type: choice
        options: [poll, 'no']
        default: 'poll'
      timeout_s:
        description: 'Local wall-clock budget (seconds).'
        required: false
        type: string
        default: '900'
      fail_on:
        description: 'failed → fail job on non-pass; never → always green.'
        required: false
        type: choice
        options: [failed, never]
        default: 'failed'
      comment_on_pr:
        description: 'Post sticky PR comment (only meaningful when manually dispatched on a PR ref).'
        required: false
        type: choice
        options: ['true', 'false']
        default: 'true'
      comment_key:
        description: 'Sticky-comment discriminator.'
        required: false
        type: string
        default: ''

jobs:
  smoke:
    uses: ./.github/workflows/argus-pr.yaml
    with:
      scenario: ${{ inputs.scenario }}
      prompt_template: ${{ inputs.prompt_template }}
      prompt_template_file: ${{ inputs.prompt_template_file }}
      base_url: ${{ inputs.base_url }}
      argus_base_url: ${{ inputs.argus_base_url }}
      ui_base_url: ${{ inputs.ui_base_url }}
      extra_vars: ${{ inputs.extra_vars }}
      wait_mode: ${{ inputs.wait_mode }}
      timeout_s: ${{ inputs.timeout_s }}
      fail_on: ${{ inputs.fail_on }}
      comment_on_pr: ${{ inputs.comment_on_pr }}
      comment_key: ${{ inputs.comment_key }}
    secrets:
      ARGUS_API_KEY: ${{ secrets.ARGUS_API_KEY }}
