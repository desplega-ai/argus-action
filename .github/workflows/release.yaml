name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  retag-major:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move `v1` to the pushed SHA
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v1\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag $TAG is not v1.x.y — nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f v1 "$GITHUB_SHA"
          git push --force origin v1
